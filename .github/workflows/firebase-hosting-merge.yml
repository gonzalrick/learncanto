# Deploys the built PWA to Firebase Hosting and the translate Cloud Function
# on every merge to main. Both reuse the same Firebase service account secret;
# functions deploy needs one-time console setup — see README.md → Deployment.
name: Deploy to Firebase on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      # Functions first, so the /api/translate rewrite always has a live target
      - name: Deploy Cloud Functions (translate API)
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_LEARNCANTO_500508 }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcp-sa.json
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$GOOGLE_APPLICATION_CREDENTIALS"
          npx firebase-tools@14 deploy --only functions --project learncanto-500508 --non-interactive
          rm -f "$GOOGLE_APPLICATION_CREDENTIALS"
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_LEARNCANTO_500508 }}
          channelId: live
          projectId: learncanto-500508
